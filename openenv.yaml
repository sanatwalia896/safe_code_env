spec_version: 1
name: safe_code_env
description: "Safe Code Env: a workspace-based coding environment where agents inspect files, edit code, run tests, and submit final filesystem state for grading."
type: space
runtime: fastapi
app: server.app:app
port: 8000
tags:
  - openenv
  - coding
  - safety
  - filesystem
  - tools
tasks:
  - id: task_1
    difficulty: easy
    description: "Repair a Flask app so /health returns {\"status\": \"ok\"} and the real tests pass"
  - id: task_2
    difficulty: medium
    description: "Fix a real SQL injection bug in db_utils.py and pass the provided tests"
  - id: task_3
    difficulty: easy
    description: "Repair a broken validator module in src/validator.py so the test suite passes"
  - id: task_4
    difficulty: medium
    description: "Repair a rolling-window rate limiter implementation in src/rate_limit.py"
  - id: task_5
    difficulty: medium
    description: "Repair a JSON config loader so defaults merge correctly and invalid JSON raises ValueError"
  - id: task_6
    difficulty: medium
    description: "Repair recursive secret redaction in src/audit.py"
  - id: task_7
    difficulty: hard
    description: "Repair pricing logic in a larger multi-module orders codebase under src/orders/"
